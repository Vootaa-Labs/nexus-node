services:
  # ── Validator 0 (bootstrap node) ─────────────────────────────────────
  nexus-node-0:
    image: ${NEXUS_IMAGE:-nexus-node}
    container_name: nexus-node-0
    hostname: nexus-node-0
    volumes:
      - ./devnet-n7s/validator-0/config:/nexus/config:ro
      - ./devnet-n7s/validator-0/keys:/nexus/keys:ro
      - ./devnet-n7s/validator-0/data:/nexus/data
    environment:
      - NEXUS_LOG_LEVEL=info
      - NEXUS_GENESIS_PATH=/nexus/config/genesis.json
      - NEXUS_VALIDATOR_KEY_PATH=/nexus/keys
      - NEXUS_STORAGE_PATH=/nexus/data/db
      - NEXUS_NETWORK_PORT=7000
      - NEXUS_GRPC_PORT=9090
      - NEXUS_NUM_SHARDS=2
    ports:
      - "8080:8080"
      - "9090:9090"
    networks:
      nexus-devnet:
        ipv4_address: 172.28.0.10
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/ready || exit 1" ]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 5

