# cargo-deny configuration for the Nexus workspace.
# Run with: cargo deny check

[graph]
targets = []

# ---------------------------------------------------------------------------
# Security advisories
# ---------------------------------------------------------------------------
[advisories]
# Known unmaintained/yanked crates tracked in BACKLOG.md for migration.
ignore = []

# ---------------------------------------------------------------------------
# License policy
# ---------------------------------------------------------------------------
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]

# ring has a non-standard ISC-style license that is not SPDX-recognized.
# It is widely used and permissive; explicitly allow the crate.
[[licenses.exceptions]]
name = "ring"
allow = ["ISC", "MIT", "OpenSSL"]

[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

# ---------------------------------------------------------------------------
# Dependency bans
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
# Wildcard deps are normal for workspace members using `workspace = true`.
wildcards         = "allow"
highlight         = "all"

deny = [
    # Enforce RustCrypto / ring over openssl to avoid C linking complexity
    { name = "openssl",       reason = "Use ring or RustCrypto crates instead" },
    { name = "openssl-sys",   reason = "Use ring or RustCrypto crates instead" },
]

# ---------------------------------------------------------------------------
# Crate source policy
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git      = "warn"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
