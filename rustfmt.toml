edition              = "2021"
max_width            = 100
use_small_heuristics = "Default"

# The four options below are nightly-only in rustfmt on stable Rust 1.82.0.
# They are kept here as documentation of intent; they take effect when the
# project moves to a nightly toolchain for formatting runs.
# imports_granularity         = "Crate"
# group_imports               = "StdExternalCrate"
# wrap_comments               = true
# format_code_in_doc_comments = true
