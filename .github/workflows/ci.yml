#
# CI Pipeline — nexus-node v0.1.13
# Gates: Lint → Security Audit → Tests → Move VM → Security Negative → Recovery → Coverage → Crypto KAT
# Triggered on every push and PR to main.
#
# NOTE: nexus-move is consumed via git dependencies (tag v0.1.1).
# No companion checkout is needed — Cargo fetches the crates directly.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Gate 1: Lint (fmt + clippy + machete)
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-machete
        run: cargo install cargo-machete --version 0.8.0 --locked

      - name: Check unused dependencies
        run: cargo machete

  # --------------------------------------------------------------------------
  # Gate 2: Security Audit (cargo-audit + cargo-deny)
  # --------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install audit tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --version 0.18.3 --locked

      - name: Cargo audit (CVE check)
        # Temporary waivers for libp2p 0.54.x TLS chain (see Docs/Report/BACKLOG.md)
        run: |
          cargo audit \
            --ignore RUSTSEC-2025-0009 \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0009

      - name: Cargo deny (licenses + bans + sources)
        # Advisory check handled by cargo-audit above; cargo-deny 0.18.x
        # cannot parse CVSS 4.0 entries in the advisory DB.
        run: cargo deny check licenses bans sources

      - name: Check no debug features in release
        run: |
          if cargo tree --workspace --edges features 2>/dev/null | grep -q 'feature "debug"'; then
            echo "::error::Debug features detected in dependency tree"
            exit 1
          fi

  # --------------------------------------------------------------------------
  # Gate 3: Tests (cargo nextest)
  # --------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Verify test fixtures (dev-address integrity)
        run: make verify-test-fixtures

      - name: Install cargo-nextest
        run: cargo install cargo-nextest --version 0.9.100 --locked

      - name: Run tests (nextest)
        run: cargo nextest run --profile ci

      - name: Run doc-tests
        run: cargo test --doc

  # --------------------------------------------------------------------------
  # Gate 3-vm: Move VM Integration Tests
  #
  # Tests nexus-execution with the move-vm feature enabled.
  # Validates the nexus-move facade boundary works end-to-end.
  # --------------------------------------------------------------------------
  test-vm:
    name: Move VM Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Move VM integration tests
        run: make test-vm

  # --------------------------------------------------------------------------
  # Gate 3a: Correctness-Negative Tests (Phase A–E release gate — F-4)
  #
  # All audit-required negative tests must pass for the build to be green.
  # Regression in ANY of these tests is a release blocker.
  # --------------------------------------------------------------------------
  correctness-negative:
    name: Correctness Negative Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Install cargo-nextest
        run: cargo install cargo-nextest --version 0.9.100 --locked

      # Phase A: Execution correctness (SEC-H2, H5, C1, H4, H3, H11, H10, M10) — 8 tests batched
      - name: "Phase A: Execution correctness"
        run: cargo nextest run --all-targets -E 'test(forged_vote_should_be_rejected) | test(forged_transaction_should_be_rejected_at_gossip_ingress) | test(execution_failure_should_not_drop_committed_batch) | test(snapshot_import_should_reject_corrupted_manifest) | test(snapshot_path_should_reject_parent_traversal) | test(agent_replay_should_be_rejected_by_idempotency_key) | test(session_capacity_should_be_enforced) | test(mvhashmap_hot_key_conflicts_should_not_drop_validation_history)'

      # Phase B: Execution-layer safety closure (SEC-H1..H6, M4, M7) — 8 tests batched
      - name: "Phase B: Execution-layer safety closure"
        run: cargo nextest run --all-targets -E 'test(execution_should_reject_forged_signed_transaction) | test(execution_should_reject_sender_pk_mismatch) | test(execution_should_reject_replayed_sequence_number) | test(execution_should_reject_expired_transaction) | test(execution_should_reject_wrong_chain_id) | test(remote_proposal_with_invalid_tx_should_be_rejected) | test(pending_proposals_should_be_bounded) | test(committed_buffer_backpressure)'

      # Phase C: Consensus safety (SEC-H7, H8, H9, H10) — 4 tests batched
      - name: "Phase C: Consensus safety"
        run: cargo nextest run --all-targets -E 'test(dag_should_reject_equivocating_certificate_same_origin_round) | test(certificate_verifier_should_reject_wrong_epoch) | test(insert_verified_certificate_should_reject_external_untrusted_input) | test(shoal_should_not_permanently_skip_late_anchor_without_recovery)'

      # Phase D: Sync & snapshot integrity (SEC-M6..M9, M11) — 5 tests batched
      - name: "Phase D: Sync & snapshot integrity"
        run: cargo nextest run --all-targets -E 'test(state_sync_should_not_amplify_single_request_across_cluster) | test(state_sync_should_reject_unverified_block_response) | test(snapshot_import_hash_failure_should_not_mutate_database) | test(snapshot_import_should_be_confined_to_snapshot_base_dir) | test(prune_should_be_atomic_across_column_families)'

      # Phase E: Auth boundaries & capacity (SEC-M14, M15, M12, M13, M1) — 5 tests batched
      - name: "Phase E: Auth boundaries & capacity"
        run: cargo nextest run --all-targets -E 'test(network_rate_limiter_should_fail_closed_when_bucket_table_is_full) | test(faucet_limiter_should_fail_closed_when_address_table_is_full) | test(mcp_caller_identity_should_be_authenticated) | test(a2a_message_with_invalid_signature_should_be_rejected) | test(dead_letter_circuit_breaker_constant_is_bounded)'

      # Phase F: Determinism & consistency gate (F-5) — 2 tests batched
      - name: "Phase F: Determinism & consistency gate"
        run: cargo nextest run --all-targets -E 'test(state_root_consistency_across_nodes) | test(serial_and_parallel_replay_state_roots_match_across_nodes)'

  # --------------------------------------------------------------------------
  # Gate 3c: Startup-Readiness Gate (F-1)
  #
  # Dedicated blocking job for readiness / health probe correctness.
  # Ensures nodes never report "ready" when subsystems are degraded.
  # --------------------------------------------------------------------------
  startup-readiness:
    name: Startup-Readiness Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: "Readiness tests (readiness_tests.rs)"
        run: cargo test -p nexus-test-utils --lib readiness_tests

      - name: "Readiness chaos suite (chaos_readiness_tests.rs)"
        run: cargo test -p nexus-test-utils --lib chaos_readiness_tests

      - name: "Readiness unit tests (nexus-rpc readiness)"
        run: cargo test -p nexus-rpc --lib readiness

      - name: "Node lifecycle boot-to-health (lifecycle_tests.rs)"
        run: cargo test -p nexus-test-utils --lib lifecycle_tests

      - name: "Node E2E boot-to-query (node_e2e_tests.rs)"
        run: cargo test -p nexus-test-utils --lib node_e2e_tests

  # --------------------------------------------------------------------------
  # Gate 3d: Epoch-Reconfig Gate (F-1)
  #
  # Dedicated blocking job for epoch management and committee rotation.
  # Ensures reconfiguration is safe across epoch boundaries.
  # --------------------------------------------------------------------------
  epoch-reconfig:
    name: Epoch-Reconfig Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: "Epoch manager lifecycle (epoch_tests.rs)"
        run: cargo test -p nexus-test-utils --lib epoch_tests

      - name: "Consensus engine epoch advance"
        run: cargo test -p nexus-consensus --lib epoch

      - name: "Epoch store persistence (nexus-node)"
        run: cargo test -p nexus-node --lib epoch_store

      - name: "B-1: Epoch stress tests (partition, restart, replay)"
        run: cargo test -p nexus-test-utils --lib epoch_stress_tests

      - name: "B-2: Governance consistency after recovery"
        run: cargo test -p nexus-test-utils --lib governance_recovery_tests

  # --------------------------------------------------------------------------
  # Gate 3d-1: Stake-Weighted Quorum Gate (K-3)
  #
  # Validates heterogeneous-stake quorum arithmetic, certificate
  # building under varied stake distributions, and combined
  # voo-precision + stake-weighted E2E correctness.
  # --------------------------------------------------------------------------
  stake-weighted-quorum:
    name: Stake-Weighted Quorum Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: "J-8: Stake-weighted quorum property tests"
        run: cargo test -p nexus-consensus --test fv_proptest j8_

      - name: "J-9: Stake-weighted certificate integration tests"
        run: cargo test -p nexus-test-utils --lib stake_weighted_cert_tests

      - name: "K-1: Economic foundation E2E tests"
        run: cargo test -p nexus-test-utils --lib economic_foundation_tests

  # --------------------------------------------------------------------------
  # Gate 3e: Proof-Surface Gate (F-1)
  #
  # Dedicated blocking job for state commitment, Merkle proofs, and
  # snapshot signing. Ensures the proof surface is sound.
  # --------------------------------------------------------------------------
  proof-surface:
    name: Proof-Surface Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: "Proof roundtrip tests (proof_tests.rs)"
        run: cargo test -p nexus-test-utils --lib proof_tests

      - name: "Commitment tracker (nexus-storage)"
        run: cargo test -p nexus-storage --lib commitment

      - name: "Snapshot signing (nexus-node)"
        run: cargo test -p nexus-node --lib snapshot_signing

      - name: "State proof RPC endpoints (nexus-rpc)"
        run: cargo test -p nexus-rpc --lib proof

      - name: "C-2: Proof smoke tests (release rehearsal)"
        run: cargo test -p nexus-test-utils --lib proof_smoke_tests

      - name: "B-3: Epoch→query/proof/snapshot e2e consistency"
        run: cargo test -p nexus-test-utils --lib epoch_e2e_consistency_tests

  # --------------------------------------------------------------------------
  # Gate 3b: P5 Recovery Tests (D-4)
  # --------------------------------------------------------------------------
  recovery:
    name: P5 Recovery Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Run recovery tests
        run: |
          cargo test -p nexus-test-utils --lib recovery_tests -- --test-threads=1

  # --------------------------------------------------------------------------
  # Gate 3j: Cold-Restart Recovery (H-2)
  #
  # End-to-end persistence and cold-restart recovery tests.
  # Validates that DAG certificates and BatchStore batches survive a
  # simulated crash and can be fully recovered from disk.
  # --------------------------------------------------------------------------
  cold-restart-recovery:
    name: Cold-Restart Recovery Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: "H-1: End-to-end cold restart tests"
        run: cargo test -p nexus-test-utils --lib cold_restart_tests

      - name: "F-4/G-4: DAG & BatchStore persistence tests"
        run: cargo test -p nexus-test-utils --lib persistence_tests

  # --------------------------------------------------------------------------
  # Gate 3h: Capacity Curves / Tier Matrix (D-2)
  #
  # Validates that quota tier limits match the Testnet Access Policy,
  # tier hierarchy invariant holds, and per-class per-tier enforcement
  # works at exact boundaries.
  # --------------------------------------------------------------------------
  capacity-curves:
    name: Capacity Curves Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: "D-2: Config defaults match access policy"
        run: cargo test -p nexus-rpc --lib middleware::tests::config_defaults_match_access_policy

      - name: "D-2: Tier hierarchy invariant"
        run: cargo test -p nexus-rpc --lib middleware::tests::tier_hierarchy_invariant

      - name: "D-2: Capacity curve exact boundary (3×3 matrix)"
        run: cargo test -p nexus-rpc --lib middleware::tests::capacity_curve_exact_boundary

      - name: "D-2: Cross-class independence under load"
        run: cargo test -p nexus-rpc --lib middleware::tests::cross_class_independence

      - name: "D-2: Fail-closed at capacity"
        run: cargo test -p nexus-rpc --lib middleware::tests::quota_manager_fail_closed_at_capacity

      - name: "D-2: Multi-IP capacity curve"
        run: cargo test -p nexus-rpc --lib middleware::tests::multi_ip_capacity_curve

  # --------------------------------------------------------------------------
  # Gate 3f: Config-Doc Drift Check (E-1)
  #
  # Ensures RpcConfig defaults in code stay in sync with the
  # documented values in Docs/Ops/Testnet_Access_Policy.md.
  # --------------------------------------------------------------------------
  config-drift:
    name: Config-Doc Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: "Check config-doc drift"
        run: zsh scripts/config-doc-drift-check.sh

  # --------------------------------------------------------------------------
  # Gate 3g: Gas Calibration Gate (D-1)
  #
  # Ensures gas budget, schedule, and timeout defaults are calibrated
  # against representative contract workload sizes.
  # --------------------------------------------------------------------------
  gas-calibration:
    name: Gas Calibration Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: "D-1: Gas budget calibration tests"
        run: cargo test -p nexus-execution --lib gas_calibration

  # --------------------------------------------------------------------------
  # Gate 3i: Release Go/No-Go Automation (E-2)
  #
  # Automated pre-release checklist that maps Testnet_Release_Runbook §5
  # go/no-go criteria to executable checks.
  # --------------------------------------------------------------------------
  release-go-nogo:
    name: Release Go/No-Go Check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [lint, security, test, test-vm, correctness-negative, startup-readiness, epoch-reconfig, stake-weighted-quorum, proof-surface, config-drift, gas-calibration, capacity-curves, cold-restart-recovery]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"
          components: clippy

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev jq zsh

      - name: Install audit tools
        run: cargo install cargo-audit --locked

      - name: "E-2: Run go/no-go checklist"
        run: zsh scripts/release-go-nogo.sh --json

  # --------------------------------------------------------------------------
  # Gate 4: Code Coverage (llvm-cov)
  # --------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.6.21 --locked

      - name: Generate coverage report
        run: |
          cargo llvm-cov --workspace \
            --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # --------------------------------------------------------------------------
  # Gate 5: Crypto KAT (Known Answer Tests — NIST vectors)
  # --------------------------------------------------------------------------
  crypto-kat:
    name: Crypto KAT
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Run ignored crypto tests (KAT vectors)
        run: |
          cargo test -p nexus-crypto \
            -- --ignored --test-threads=1

  # --------------------------------------------------------------------------
  # Workspace check (all features compile)
  # --------------------------------------------------------------------------
  check:
    name: Workspace Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Cargo check (workspace)
        run: cargo check --workspace --all-targets

  # --------------------------------------------------------------------------
  # Gate: Formal Verification (FV-7)
  #
  # Runs all property tests, differential corpus tests, and formal
  # verification harnesses across consensus, intent, and execution.
  # --------------------------------------------------------------------------
  formal-verification:
    name: Formal Verification Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: "FV-1: Differential corpus auto-runner (18 harnesses)"
        run: cargo test -p nexus-test-utils --lib fv_diff_

      - name: "FV-5a: Consensus property tests"
        run: cargo test -p nexus-consensus --test fv_proptest

      - name: "FV-5b: Consensus formal property tests"
        run: cargo test -p nexus-consensus --test fv_property_tests

      - name: "FV-5c: Intent / Agent-core property tests"
        run: cargo test -p nexus-intent --test fv_proptest

      - name: "FV-5d: Execution property tests (multi-shard, HTLC, state root)"
        run: cargo test -p nexus-execution --test fv_proptest

  move-vm-smoke:
    name: Move VM Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [test, test-vm, check]
    steps:
      - uses: actions/checkout@v6.0.2


      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev jq

      - name: Validate default move-vm test surface
        run: |
          cargo test -p nexus-execution --lib nexus_vm
          cargo test -p nexus-wallet --test move_cli_integration

      - name: Build release toolchain for smoke scripts
        run: |
          cargo build --release -p nexus-node -p nexus-keygen -p nexus-genesis -p nexus-wallet

      - name: Build node image (reuse host binaries)
        run: docker build --target runtime-prebuilt -t nexus-node .

      - name: Bootstrap local devnet
        run: |
          ./scripts/setup-devnet.sh -o devnet-mvs-ci -f
          ./scripts/generate-compose.sh -o docker-compose-mvs-ci.yml -d ./devnet-mvs-ci -n 7

      - name: Start local devnet
        run: docker compose -f docker-compose-mvs-ci.yml up -d

      - name: Run container smoke test
        run: ./scripts/smoke-test.sh

      - name: Run contract smoke test
        run: ./scripts/contract-smoke-test.sh

      - name: Collect container logs on failure
        if: failure()
        run: docker compose -f docker-compose-mvs-ci.yml logs --no-color > docker-compose.log

      - name: Upload container logs
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: move-vm-smoke-logs
          path: docker-compose.log

      - name: Stop local devnet
        if: always()
        run: docker compose -f docker-compose-mvs-ci.yml down -v
