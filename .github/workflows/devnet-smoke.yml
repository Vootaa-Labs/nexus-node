# CI — Devnet Cluster Smoke Test
# Builds a 4-node Docker devnet on every push/PR and verifies it is alive.
#
# Gates:
#   - Docker build succeeds
#   - 4-node compose cluster starts and all nodes reach /ready
#   - Consensus commits are advancing within a time window
#   - Peer connectivity meets minimum threshold
#
# This runs after the main test suite to avoid blocking fast feedback.

name: Devnet Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NEXUS_NUM_VALIDATORS: 4

concurrency:
  group: devnet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  devnet-smoke:
    name: 4-Node Cluster Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev curl jq

      - name: Build Docker image
        run: docker build -t nexus-node .

      - name: Bootstrap 4-node devnet
        run: |
          ./scripts/setup-devnet.sh \
            -n 4 \
            -c nexus-ci-test \
            -o ./devnet-smoke-ci \
            -f

      - name: Generate docker-compose for CI
        run: |
          ./scripts/generate-compose.sh \
            -n 4 \
            -o ./docker-compose-smoke-ci.yml \
            -d ./devnet-smoke-ci

      - name: Start cluster
        run: docker compose -f docker-compose-smoke-ci.yml up -d

      - name: Wait for all nodes to become ready (120s max)
        run: |
          for i in 0 1 2 3; do
            PORT=$((8080 + i))
            echo "Waiting for node-$i on port $PORT..."
            ELAPSED=0
            while [ "$ELAPSED" -lt 120 ]; do
              if curl -sf "http://localhost:${PORT}/ready" > /dev/null 2>&1; then
                echo "  node-$i ready after ${ELAPSED}s"
                break
              fi
              sleep 3
              ELAPSED=$((ELAPSED + 3))
            done
            if [ "$ELAPSED" -ge 120 ]; then
              echo "::error::node-$i failed to become ready within 120s"
              docker compose -f docker-compose-smoke-ci.yml logs "nexus-node-$i" | tail -30
              exit 1
            fi
          done

      - name: Verify consensus is advancing
        run: |
          COMMITS_BEFORE=$(curl -sf http://localhost:8080/v2/consensus/status \
            | grep -o '"total_commits":[0-9]*' | grep -o '[0-9]*' || echo "0")
          echo "Commits before: $COMMITS_BEFORE"
          sleep 30
          COMMITS_AFTER=$(curl -sf http://localhost:8080/v2/consensus/status \
            | grep -o '"total_commits":[0-9]*' | grep -o '[0-9]*' || echo "0")
          echo "Commits after:  $COMMITS_AFTER"
          DELTA=$((COMMITS_AFTER - COMMITS_BEFORE))
          echo "Delta: $DELTA"
          if [ "$DELTA" -lt 1 ]; then
            echo "::error::Consensus not advancing ($COMMITS_BEFORE → $COMMITS_AFTER)"
            docker compose -f docker-compose-smoke-ci.yml logs --tail=50
            exit 1
          fi
          echo "✓ Consensus advancing (Δ=$DELTA)"

      - name: Verify peer connectivity
        run: |
          for i in 0 1 2 3; do
            PORT=$((8080 + i))
            PEERS=$(curl -sf "http://localhost:${PORT}/health" \
              | grep -o '"peers":[0-9]*' | grep -o '[0-9]*' || echo "0")
            echo "node-$i peers: $PEERS"
            if [ "$PEERS" -lt 1 ]; then
              echo "::warning::node-$i has $PEERS peers (expected ≥ 1)"
            fi
          done

      - name: Verify chain head is advancing
        run: |
          HEAD=$(curl -sf http://localhost:8080/v2/chain/head \
            | grep -o '"sequence":[0-9]*' | grep -o '[0-9]*' || echo "0")
          echo "Chain head sequence: $HEAD"
          if [ "$HEAD" -lt 1 ]; then
            echo "::error::Chain head not advancing (sequence=$HEAD)"
            exit 1
          fi
          echo "✓ Chain head at sequence $HEAD"

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose-smoke-ci.yml logs --tail=100 > devnet-logs.txt 2>&1
          echo "--- Last 100 lines per node ---"
          cat devnet-logs.txt

      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: devnet-logs
          path: devnet-logs.txt
          retention-days: 7

      - name: Tear down cluster
        if: always()
        run: docker compose -f docker-compose-smoke-ci.yml down -v
